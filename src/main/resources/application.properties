# 1. Configuración de la aplicación
spring.application.name=sistema-escolar

# 2. Conexión a la base de datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/sistema_escolar?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Felixmendez21*

# 3. Driver de MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 4. Configuración de JPA / Hibernate
# 'update' creará las tablas si no existen
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# 5. Configuración de Swagger/OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# 6. Puerto del servidor 8080
server.port=8080
